name: Push to GitVerse and GitHub
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Push to GitVerse
        run: |
          git remote add gitverse https://oauth2:${{ secrets.GITVERSE_TOKEN }}@gitverse.ru/kfwlru/sub.git
          git push -f gitverse main
      
      - name: Sync file to GitHub
        run: |
          # Клонируем GitHub репозиторий
          git clone https://${{ secrets.VERCEL_TOKEN }}@github.com/prominbro/kfwlsub.git github_repo
          
          # Копируем файл 212.txt как sub
          cp 212.txt github_repo/sub
          
          # Коммитим и пушим
          cd github_repo
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add sub
          git commit -m "Update subs from 212.txt" || echo "No changes"
          git push -f origin main
